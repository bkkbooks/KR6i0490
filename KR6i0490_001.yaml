body:
  text: 失譯人今附東晉録聞如是一時佛遊羅閲祇耆闍崛山中與大比丘衆一千二百五十人俱菩薩無數名稱遠聞天人所敬時難國王名波流離遣使來到佛所頂禮佛足白佛言世尊我國邊小頻歲寇賊五穀勇貴疾病流行人民困苦我恆不得安臥如來法藏多悉深廣我有憂務不得修行唯願世尊特垂慈愍賜我要法使我日夜易得修行未來世中遠離衆苦佛告王言若欲滅煩惱障報障者當貫木槵子一百八以常自隨若行若坐若臥恆當至心無分散意稱佛陀達摩僧伽名乃過一木槵子如是漸次度木槵子若十若二十若百若千乃至百千萬若能滿二十萬遍身心不亂無諸諂曲者捨命得生第三焰天衣食自然常安樂行若復能滿一百萬遍者當得斷除百八結業始名背生死流趣向泥洹永斷煩惱根獲無上果信還啓王王大歡喜遙向世尊頭面禮佛云大善我當奉行即敕吏民營辦木槵子以為千具六親國戚皆與一具王常誦念雖親軍旅亦不廢置又作是念世尊大慈普應一切若我此善得免長淪苦海如來當現我身為我說法願樂迫心三日不食佛即應形與諸眷屬來其宮內而告王曰莎斗比丘誦三寶名經歷十歲得成斯陀含果漸次習行今在普香世界作辟支佛王聞是已倍復修行佛告阿難何況能誦三寶名經歷萬數但能聞此人名生一念隨喜者未來生處常聞十善說是法時大衆歡喜皆願奉行
